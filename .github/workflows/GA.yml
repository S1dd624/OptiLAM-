  public class CompiledSingleObjectiveProblemDefinition : CompiledProblemDefinition, ISingleObjectiveProblemDefinition {
    public bool Maximization { get { return true; } }

  public override void Initialize() {
  try {
    var g = ((IntValue)vars.Generations).Value;
    if (g == 0) {
      vars.chromoLength = new IntValue(25);
      vars.maxGen = new IntValue(5000);  // compile code before every run to reset
    }
  } catch {
    // If 'Generations' doesn't exist yet
    vars.chromoLength = new IntValue(25);
    vars.maxGen = new IntValue(5000);
    vars.Generations = new IntValue(0); // Ensure it’s initialized
  }

  int n = ((IntValue)vars.chromoLength).Value;
  int L = ((IntValue)vars.canvasLength).Value;
  int H = ((IntValue)vars.canvasHeight).Value;
  int numRot = ((IntValue)vars.numRot).Value;

  var xEncoding = new IntegerVectorEncoding("x", length: n, min: 0, max: L);
  var yEncoding = new IntegerVectorEncoding("y", length: n, min: 0, max: H);
  var rotationEncoding = new IntegerVectorEncoding("rotation", length: n, min: 0, max: 360, step: 360 / numRot);

   Encoding = new MultiEncoding()
  .Add(new IntegerVectorEncoding("x", n, 0, L))
  .Add(new IntegerVectorEncoding("y", n, 0, H))
  .Add(new IntegerVectorEncoding("rotation", n, 0, 360, step: 360 / numRot));

  // Reset Generations to 0 explicitly
  vars.Generations = new IntValue(0);
  
  
 

}





  public double Evaluate(Individual individual, IRandom random){
      
     Console.WriteLine(">> EVALUATE called");

    // Convert the chromosome to a string directly
    string chromosome = ConvertChromosomeToString(individual);

    // Call the external evaluator and capture the fitness
    double fitness = RunExternalEvaluator(chromosome);

    if (double.IsNaN(fitness) || double.IsInfinity(fitness)) throw new Exception("Invalid fitness value received.");
    
    return fitness;// Return the fitness to HeuristicLab
    
    

}


     private string ConvertChromosomeToString(Individual individual) {
    // Assuming individual is encoded using MultiEncoding (X, Y, Rotation)
    var xValues = individual.IntegerVector("x");
    var yValues = individual.IntegerVector("y");
    var rotationValues = individual.IntegerVector("rotation");

    // Prepare a line that contains all values in the format "x1,y1,r1,x2,y2,r2,..."
    string line = "";

    for (int i = 0; i < ((IntValue)vars.chromoLength).Value; i++) {
        if (i > 0) line += ","; // Add a comma before each value after the first
        line += xValues[i] + "," + yValues[i] + "," + rotationValues[i];
    }

    return line; // Return the chromosome string
}


    
private double RunExternalEvaluator(string chromosome) 
{
    // Set your BMP folder path here
    string basePath = @"C:\Users\iitsi\Nesting_GA\Nesting_GA\Files\final_generator\output_bmps";
    string fitnessEvaluatorPath = @"C:\Users\iitsi\Nesting_GA\Nesting_GA\Files\FitnessEvaluator.exe";
    
    // Create and configure the process
    System.Diagnostics.Process process = new System.Diagnostics.Process();
    process.StartInfo.FileName = fitnessEvaluatorPath;
    process.StartInfo.Arguments = string.Format("\"{0}\" \"{1}\"", chromosome, basePath);
    process.StartInfo.RedirectStandardOutput = true;
    process.StartInfo.UseShellExecute = false;
    process.StartInfo.CreateNoWindow = true;
    
    // Start the process and capture output
    process.Start();
    string output = process.StandardOutput.ReadToEnd();
    process.WaitForExit();
    
    // Parse the fitness value from output
    double fitnessValue = 0.0;
    if (double.TryParse(output.Trim(), out fitnessValue))
    {
        return fitnessValue;
    }
    else
    {
        // Handle error case
        throw new Exception("Failed to parse fitness value from output: {output}");
    }
}

     

    public void Analyze(Individual[] individuals, double[] qualities, ResultCollection results, IRandom random) {
    var orderedIndividuals = individuals.Zip(qualities, (i, q) => new { Individual = i, Quality = q }).OrderBy(z => z.Quality);
    var best = Maximization ? orderedIndividuals.Last().Quality : orderedIndividuals.First().Quality;

    if (!results.ContainsKey("Generations")) {
        results.Add(new Result("Generations", typeof(IntValue)));
        results["Generations"].Value = new IntValue(0);
    }

    IntValue currentGeneration = (IntValue)results["Generations"].Value;
    Console.WriteLine("[GENERATION]: {currentGeneration.Value}");
    Console.WriteLine("[BEST FITNESS]: {best}");

    // ✅ Increment the generation in both results and vars
    currentGeneration.Value++;
    ((IntValue)vars.Generations).Value = currentGeneration.Value;

    // Now your convergence logic will trigger correctly
}



