      //}
      //results["Best Solution"].Value = (IItem)best.RealVector("r").Clone();
         
        
        // Access the best fitness value from the results
        double bestFitness = best;
            if (!results.ContainsKey("Generations"))
         {
              // If not, create a new result for "Generation" with Integer type
              results.Add(new Result("Generations", typeof(IntValue)));
              results["Generations"].Value = new IntValue(0);
         }
         if (!results.ContainsKey("numberOfFPs"))
         {
              // If not, create a new result for "Generation" with Integer type
              results.Add(new Result("numberOfFPs", typeof(IntValue)));
              results["numberOfFPs"].Value = new IntValue(((IntValue)vars.chromoLength).Value);
         }


        //results["numberOfFPs"].Value = vars.chromoLength.Value;
        IntValue currentGeneration = ((IntValue)(results["Generations"]).Value);
        
        // Optionally, log or print the current generation
        Console.WriteLine(currentGeneration.Value);

        // Check if the best fitness is less than 0 and generation has reached 2000
        if (bestFitness < 0 && currentGeneration.Value >= ((IntValue)vars.maxGen).Value)
        {
            // Access the chromosome length from the algorithm's results
            var chromosomeLength = ((IntValue)vars.chromoLength).Value;
            
            // Reduce the chromosome length by 1
            chromosomeLength -= 1;

            // Update the chromosome length back to the algorithm results
            ((IntValue)vars.chromoLength).Value = chromosomeLength;
            ((IntValue)vars.Generations).Value = currentGeneration.Value;
            ((IntValue)vars.maxGen).Value +=5000;
            Initialize();
         }
    }

